<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Codex of Giza - V2 Hybrid Build</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; color: #e0e0e0; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #game-container { position: relative; width: 100vw; height: 100vh; max-width: calc(100vh * (1280 / 720)); max-height: calc(100vw * (720 / 1280)); border: 2px solid #333; background: #111; box-shadow: 0 0 20px rgba(0,0,0,0.8); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; background-color: #1a1a1a; transition: filter 1.5s ease; }
        #ui-overlay { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; z-index: 10; }
        #dialogue-box { background: rgba(0, 0, 0, 0.95); border: 1px solid #d4af37; padding: 20px; border-radius: 5px; min-height: 120px; }
        #speaker-name { color: #d4af37; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; font-size: 1.1em; }
        #dialogue-text { line-height: 1.6; margin-bottom: 20px; font-size: 0.95em; white-space: pre-wrap; }
        .choice-button { display: block; width: 100%; background: #222; border: 1px solid #444; color: #e0e0e0; padding: 12px; margin-top: 8px; text-align: left; cursor: pointer; transition: all 0.2s ease; font-family: 'Courier New', Courier, monospace; }
        .choice-button:hover { background: #d4af37; color: #000; border-color: #d4af37; }
        #interaction-prompt { position: absolute; bottom: 200px; left: 50%; transform: translateX(-50%); background: rgba(212, 175, 55, 0.9); color: black; padding: 10px 20px; border-radius: 20px; font-weight: bold; pointer-events: none; z-index: 5; }
        /* Top-right HUD: sanity only */
        #hud { position: absolute; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.85); padding: 12px 15px; font-size: 12px; border: 1px solid #444; border-radius: 4px; color: #ccc; z-index: 5; min-width: 140px; }
        #hud span { color: #d4af37; font-weight: bold; }
        /* Bottom-left HUD: stamina + funds */
        #hud-bottomleft { position: absolute; bottom: 10px; left: 10px; background: rgba(0, 0, 0, 0.85); padding: 12px 15px; font-size: 12px; border: 1px solid #444; border-radius: 4px; color: #ccc; z-index: 5; min-width: 160px; }
        #hud-bottomleft span { color: #d4af37; font-weight: bold; }
        #stamina-bar-bg { width: 100%; height: 8px; background: rgba(100,100,100,0.5); margin-top: 3px; border: 1px solid #666; border-radius: 2px; }
        #stamina-bar-fill { height: 100%; background: linear-gradient(90deg, #d4af37 0%, #f4e4b0 100%); border-radius: 2px; transition: width 0.1s ease; }
        .hidden { display: none !important; }
        #hud-hint { position: absolute; top: 10px; left: 10px; font-size: 11px; color: #888; z-index: 4; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 4px; }
        .strained-filter  { filter: contrast(120%) saturate(70%) hue-rotate(15deg); }
        .fractured-filter { filter: contrast(150%) saturate(50%) hue-rotate(60deg); }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="interaction-prompt" class="hidden">Tap or Press SPACE to interact</div>
        <div id="hud-hint" class="hidden">TAB: Stats &nbsp;|&nbsp; E: Focus &nbsp;|&nbsp; ESC: Pause &nbsp;|&nbsp; SHIFT: Sprint &nbsp;|&nbsp; Tap/SPACE: Interact</div>
        <div id="ui-overlay" class="hidden">
            <div id="dialogue-box">
                <div id="speaker-name"></div>
                <p id="dialogue-text"></p>
                <div id="choices-container"></div>
            </div>
        </div>
        <!-- Top-right: Sanity only -->
        <div id="hud" class="hidden">
            <div>Sanity: <span id="stat-sanity">CALM</span></div>
            <div style="margin-top: 6px;">Funds: <span id="stat-funds">2000</span> EGP</div>
        </div>
        <!-- Bottom-left: Stamina only -->
        <div id="hud-bottomleft" class="hidden">
            <div>Stamina: <span id="stat-stamina">10.0</span> / 10
                <div id="stamina-bar-bg"><div id="stamina-bar-fill" style="width: 100%;"></div></div>
            </div>
        </div>
    </div>

    <script src="data.js?v=3"></script>
    <script src="dialogue.js?v=3"></script>
    <script src="engine.js?v=3"></script>
</body>
</html>
